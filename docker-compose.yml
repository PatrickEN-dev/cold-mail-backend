name: coldmail-backend

services:
  redis:
    image: redis:7-alpine
    container_name: coldmail-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional: local Postgres for development.
  # In production we use Supabase Postgres (DATABASE_URL points there).
  # Enable with: docker compose --profile local-db up
  postgres:
    image: postgres:16-alpine
    container_name: coldmail-postgres
    restart: unless-stopped
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coldmail
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coldmail"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Application container. Enable with: docker compose --profile app up
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coldmail-api
    restart: unless-stopped
    profiles: ["app"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  postgres-data:
